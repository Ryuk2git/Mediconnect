<form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">

    <input type="text" placeholder="Username" formControlName="username" />
    <input type="password" placeholder="Password" formControlName="password" />
    <input type="text" placeholder="Full Name" formControlName="fullName" />
    <input type="text" placeholder="Contact Number" formControlName="contactNumber" />
    <input type="email" placeholder="Email" formControlName="email" />

    <select formControlName="role" (change)="onRoleChange($event)">
        <option value="">Select Role</option>
        <option value="DOCTOR">Doctor</option>
        <option value="PATIENT">Patient</option>
    </select>

    <div *ngIf="selectedRole === 'DOCTOR'">
        <input type="text" placeholder="Specialty" formControlName="specialty" />
        <input type="number" placeholder="Experience" formControlName="experience" />
    </div>

    <div *ngIf="selectedRole === 'PATIENT'">
        <input type="date" placeholder="Date of Birth" formControlName="dob" />
        <input type="text" placeholder="Address" formControlName="address" />
    </div>

    <button type="submit">Register</button>

</form>

<div *ngIf="successMessage">{{ successMessage }}</div>
<div *ngIf="errorMessage">{{ errorMessage }}</div>
