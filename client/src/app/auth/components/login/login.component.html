<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <input type="text" placeholder="Username" formControlName="username" />

    <div *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
        <small *ngIf="loginForm.get('username')?.errors?.['required']">
            Username is required
        </small>
        <small *ngIf="loginForm.get('username')?.errors?.['pattern']">
            No special characters allowed
        </small>
    </div>

    <input type="password" placeholder="Password" formControlName="password" />

    <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        <small *ngIf="loginForm.get('password')?.errors?.['required']">
            Password is required
        </small>
        <small *ngIf="loginForm.get('password')?.errors?.['minlength']">
            Minimum 8 characters required
        </small>
        <small *ngIf="loginForm.get('password')?.errors?.['pattern']">
            Must contain one capital letter and one number
        </small>
    </div>

    <button type="submit">Login</button>

</form>

<div *ngIf="successMessage">{{ successMessage }}</div>
<div *ngIf="errorMessage">{{ errorMessage }}</div>
